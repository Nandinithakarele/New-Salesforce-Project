<template>
    <lightning-layout multiple-rows horizontal-align="spread">
        <lightning-layout-item size="5" class="slds-box">
            <lightning-input type="phone" label="phone" placeholder="phone" onchange={handlePhoneChange}></lightning-input>
        </lightning-layout-item>
        <lightning-layout-item size="5" class="slds-box">
            <lightning-input type="email" label="email" placeholder="email" onchange={handleEmailChange}></lightning-input>
        </lightning-layout-item>
    </lightning-layout>
</template>
